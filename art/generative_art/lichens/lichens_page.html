<!doctype html>
<html lang="en-UK">
  <head>
    <link href="../../../../../styles/main.css" rel="stylesheet" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Daniele Scanzi</title>
    
    <script>
      async function include(selector, url) {
        const res = await fetch(url);
        const html = await res.text();
        document.querySelector(selector).innerHTML = html;
      }

      document.addEventListener("DOMContentLoaded", () => {
        include("#header", "../../../../../header.html");
        include("#footer", "../../../../../footer.html");
      });
  </script>
    
  </head>
  
  <body>
     <!-- Header Menu -->
    <div id="header"></div>
    
    <!-- Post content -->
    <main class="post-container">
      <article class="post">
        <h1>Crustose Lichens</h1>
        <p><center>A generative art project that uses a cellular automaton to simulate populations of <a href="https://en.wikipedia.org/wiki/Crustose_lichen">crustose lichens</a>. Code freely available on <a href="https://github.com/d-scanzi/crustose_lichens/tree/main">GitHub</a></center></p>
        <div class="entry">
          <div class="image-container">
            <img src="../../images/lichens/lichen_19.png", alt="Generative art of pixelated lichens">
            <img src="../../images/lichens/lichen_6.png", alt="Generative art of pixelated lichens">
            <img src="../../images/lichens/lichen_236.png", alt="Generative art of pixelated lichens">
            <img src="../../images/lichens/lichen_5.png", alt="Generative art of pixelated lichens">
           <img src="../../images/lichens/lichen_3.png", alt="Generative art of pixelated lichens">
           <img src="../../images/lichens/lichen_20.png", alt="Generative art of pixelated lichens">
          <img src="../../images/lichens/lichen_31.png", alt="Generative art of pixelated lichens">
          </div>
        </div>
      </article>
    </main>
    <!-- Footer -->
    <div id="footer"></div>
    
  </body>
</html>
