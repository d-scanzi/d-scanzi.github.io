<!doctype html>
<html lang="en-UK">
  <head>
    <link href="../../styles/main.css" rel="stylesheet" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Daniele Scanzi</title>
    
    <script>
      async function include(selector, url) {
        const res = await fetch(url);
        const html = await res.text();
        document.querySelector(selector).innerHTML = html;
      }

      document.addEventListener("DOMContentLoaded", () => {
        include("#header", "../../header.html");
        include("#footer", "../../footer.html");
      });
  </script>
    
  </head>
  
  <body>
     <!-- Header Menu -->
    <div id="header"></div>
    
    <!-- Post content -->
    <main class="post-container">
      <article class="post">
        <h1>Night Juggling</h1>
        <div class="entry">
          <div class="image-container">
            <img src="../images/juggling/juggling_1.png", alt="Juggling at night 4 red balls">
            <img src="../images/juggling/juggling_2.png", alt="Juggling at night 4 green balls">
            <img src="../images/juggling/juggling_3.png", alt="Juggling at night 4 pink balls">
            <img src="../images/juggling/juggling_4.png", alt="Juggling at night 4 red balls">
            <img src="../images/juggling/juggling_5.png", alt="Juggling at night 4 yellow balls">
            <img src="../images/juggling/juggling_6.png", alt="Juggling at night 4 green balls">
          </div>
        </div>
      </article>
    </main>
    <!-- Footer -->
    <div id="footer"></div>
    
  </body>
</html>
